<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sebastien A. Renault</title>
    <script type="text/javascript">
      // SPA redirect for GitHub Pages: encodes the deep-link path into a query
      // string and bounces to index.html, which restores it. pathSegmentsToKeep
      // is 0 because this is a user page served from the domain root.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
